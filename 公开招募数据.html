function processData(data) {
    // 只处理 3、4、5 星干员
    const filtered = data.filter(d => ['3', '4', '5'].includes(d.星级));

    // 存储每个标签组合的干员，按星级分组
    const comboMap = new Map(); // key: JSON.stringify(排序后的标签数组), value: {3:[],4:[],5:[]}

    filtered.forEach(d => {
        const star = d.星级;
        const name = d.干员代号;

        // 提取职业标签（如“特种”）
        const profession = d["职业 - 分支"].split(' - ')[0].trim();

        // 合并原标签和职业标签，去重并排序
        let tags = [...new Set([...d.标签, profession])];
        tags.sort();

        // 生成该干员的所有非空标签子集
        const n = tags.length;
        for (let mask = 1; mask < (1 << n); mask++) {
            const subset = [];
            for (let i = 0; i < n; i++) {
                if (mask & (1 << i)) {
                    subset.push(tags[i]);
                }
            }
            const key = JSON.stringify(subset);
            if (!comboMap.has(key)) {
                comboMap.set(key, { 3: [], 4: [], 5: [] });
            }
            // 避免同一个干员在同一个组合中重复（理论上不会，但安全起见）
            if (!comboMap.get(key)[star].includes(name)) {
                comboMap.get(key)[star].push(name);
            }
        }
    });

    // 构建初始结果：每个组合取最小星级
    const results = [];
    for (let [key, starMap] of comboMap.entries()) {
        let minStar = null;
        if (starMap['3'].length > 0) minStar = '3';
        else if (starMap['4'].length > 0) minStar = '4';
        else if (starMap['5'].length > 0) minStar = '5';

        if (minStar) {
            results.push({
                标签: JSON.parse(key),
                名字: [...new Set(starMap[minStar])], // 去重
                星级: minStar
            });
        }
    }

    // 按星级分组，进行冗余去除
    const grouped = {};
    results.forEach(r => {
        if (!grouped[r.星级]) grouped[r.星级] = [];
        grouped[r.星级].push(r);
    });

    const finalResults = [];

    for (let star in grouped) {
        const group = grouped[star];

        // 为每个结果准备排序后的名字字符串，用于快速比较包含关系
        group.forEach(r => {
            r.nameSet = new Set(r.名字);
        });

        const keep = new Array(group.length).fill(true);

        // 双重循环检查冗余：如果存在另一个组合A，其标签是当前组合B的真子集，且A的干员集包含B的干员集，则B冗余
        for (let i = 0; i < group.length; i++) {
            const b = group[i];
            for (let j = 0; j < group.length; j++) {
                if (i === j) continue;
                const a = group[j];
                // a 的标签是 b 的标签的真子集
                if (a.标签.length < b.标签.length && a.标签.every(tag => b.标签.includes(tag))) {
                    // a 的干员集是否包含 b 的干员集
                    const bNames = b.nameSet;
                    const aNames = a.nameSet;
                    let allIn = true;
                    for (let name of bNames) {
                        if (!aNames.has(name)) {
                            allIn = false;
                            break;
                        }
                    }
                    if (allIn) {
                        keep[i] = false;
                        break;
                    }
                }
            }
        }

        // 收集保留的结果
        group.forEach((r, idx) => {
            if (keep[idx]) {
                delete r.nameSet; // 清理临时字段
                finalResults.push(r);
            }
        });
    }

    // 排序：先按星级，再按标签数量，最后按标签字符串
    finalResults.sort((a, b) => {
        if (a.星级 !== b.星级) return a.星级.localeCompare(b.星级);
        if (a.标签.length !== b.标签.length) return a.标签.length - b.标签.length;
        return a.标签.join('').localeCompare(b.标签.join(''));
    });

    return finalResults;
}
